name: lake build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Surfaces the broken-modules state without gating: this repo holds
      # known-broken research-tier proofs whose repair is the work this CI
      # exists to track. continue-on-error keeps the workflow green so
      # downstream signals (badges, branch protection) reflect intent.
      - name: lake build (informational)
        uses: leanprover/lean-action@v1
        continue-on-error: true
        with:
          test: false
          lint: false
